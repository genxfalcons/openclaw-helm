name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          tag=${GITHUB_REF#refs/tags/v}
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify Chart.yaml version matches
        run: |
          chart_version=$(grep '^version:' Chart.yaml | awk '{print $2}')
          if [ "$chart_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "Error: Tag v${{ steps.version.outputs.version }} doesn't match Chart.yaml version $chart_version"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          helm package .
          helm push openclaw-helm-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}

      - name: Generate changelog
        id: changelog
        run: |
          app_version=$(grep '^appVersion:' Chart.yaml | awk '{print $2}' | tr -d '"')
          cat > release-notes.md << EOF
          ## Changes
          
          - Chart version: ${{ steps.version.outputs.version }}
          - OpenClaw version: $app_version
          
          ## Install
          
          \`\`\`bash
          helm install openclaw oci://ghcr.io/${{ github.repository_owner }}/openclaw-helm --version ${{ steps.version.outputs.version }}
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          generate_release_notes: true
