name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Chart.yaml"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install chart-releaser
        run: |
          CR_VERSION="1.6.1"
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}/chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz cr
          sudo mv cr /usr/local/bin/cr

      - name: Get chart info
        id: chart
        run: |
          echo "version=$(grep '^version:' Chart.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "name=$(grep '^name:' Chart.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package . --destination .cr-release-packages

      - name: Upload chart to GitHub release
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --package-path .cr-release-packages \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --skip-existing

      - name: Update Helm repo index on gh-pages
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --package-path .cr-release-packages \
            --index-path ./index.yaml \
            --charts-repo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --push

      - name: Append OCI install instructions to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.chart.outputs.version }}"
          TAG="${{ steps.chart.outputs.name }}-${VERSION}"

          # Skip if release was not created (skip_existing)
          if ! gh release view "${TAG}" --repo "${OWNER}/${REPO}" > /dev/null 2>&1; then
            echo "Release ${TAG} not found, skipping notes update."
            exit 0
          fi

          cat > /tmp/release-notes-append.md << EOF

          ## 安裝方式

          ### Helm Repository（GitHub Pages）
          \`\`\`bash
          helm repo add openclaw https://${OWNER}.github.io/${REPO}
          helm repo update
          helm install openclaw openclaw/${REPO} --version ${VERSION}
          \`\`\`

          ### OCI Registry
          \`\`\`bash
          helm pull oci://ghcr.io/${OWNER}/${REPO} --version ${VERSION}
          helm install openclaw oci://ghcr.io/${OWNER}/${REPO} --version ${VERSION}
          \`\`\`
          EOF

          EXISTING=$(gh release view "${TAG}" --repo "${OWNER}/${REPO}" --json body --jq '.body' 2>/dev/null || echo "")
          printf '%s\n' "${EXISTING}" > /tmp/existing-notes.md
          cat /tmp/existing-notes.md /tmp/release-notes-append.md > /tmp/final-notes.md

          gh release edit "${TAG}" \
            --repo "${OWNER}/${REPO}" \
            --notes-file /tmp/final-notes.md
